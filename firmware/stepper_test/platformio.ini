; PlatformIO project configuration — EPD 3D G6 stepper test
; Target: ESP32-C6 SuperMini

[env:esp32c6_supermini]
; pioarduino fork — fixes Arduino framework support for ESP32-C6
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino

board_build.flash_mode = qio
monitor_speed          = 115200
upload_speed           = 921600

; Optional: if PlatformIO cannot auto-detect the port, add:
;   upload_port = COMx        (Windows)
;   upload_port = /dev/ttyACMx (Linux/macOS)
