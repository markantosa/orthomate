; PlatformIO — EPD 3D G6  |  Full operational firmware
; Target: ESP32-C6 SuperMini

[env:esp32c6_main]
; pioarduino fork — required for ESP32-C6 Arduino framework support
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board     = esp32-c6-devkitc-1
framework = arduino

board_build.flash_mode = qio
monitor_speed          = 115200
upload_speed           = 921600

; Route Serial to native USB CDC (COM28) instead of hardware UART0 pins
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    h2zero/NimBLE-Arduino @ ^2.1.0

upload_port = COM27
